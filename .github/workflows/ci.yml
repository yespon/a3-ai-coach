name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: gangbiao_test
          POSTGRES_USER: gangbiao
          POSTGRES_PASSWORD: test_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql+asyncpg://gangbiao:test_password@localhost:5432/gangbiao_test
      JWT_SECRET_KEY: ci-test-secret-key-at-least-32-bytes-long!!
      JWT_ALGORITHM: HS256
      OPENAI_API_KEY: ""
      MATERIALS_AUTOLOAD: false

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python - <<'PY'
          import subprocess
          import sys
          import tomllib

          with open("pyproject.toml", "rb") as f:
            data = tomllib.load(f)

          deps = data.get("project", {}).get("dependencies", [])
          dev_deps = data.get("dependency-groups", {}).get("dev", [])
          pkgs = [*deps, *dev_deps]

          if pkgs:
            subprocess.check_call([sys.executable, "-m", "pip", "install", *pkgs])
          PY

      - name: Run database migrations
        run: alembic upgrade head

      - name: Run tests
        run: pytest -q