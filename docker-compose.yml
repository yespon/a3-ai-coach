services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: gangbiao
      POSTGRES_USER: gangbiao
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-gangbiao_dev}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gangbiao"]
      interval: 5s
      timeout: 3s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://gangbiao:${POSTGRES_PASSWORD:-gangbiao_dev}@postgres:5432/gangbiao
      CORS_ALLOW_ORIGINS: "http://localhost:2088,http://127.0.0.1:2088,http://localhost:3000,http://127.0.0.1:3000"
      MATERIALS_DIR: /app/materials
    volumes:
      - ./uploads:/app/uploads
      - ./logs:/app/logs
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_BASE_URL: /
    restart: unless-stopped
    depends_on:
      - backend

  nginx:
    image: nginx:1.27-alpine
    ports:
      - "2088:80"
    volumes:
      - ./deploy/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - frontend
      - backend
    restart: unless-stopped

volumes:
  pgdata:
